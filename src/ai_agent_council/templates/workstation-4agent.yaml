# Workstation-class council: 4 agents, 12GB VRAM (e.g. RTX 4070).
# Three local models + a cheap cloud orchestrator; synthesis quality lives in the orchestrator
# role, so we buy it off-device.
#
# Before running:
#   ollama pull gemma3:4b
#   ollama pull deepseek-r1:7b
#   ollama pull phi4-mini:3.8b
#   export OLLAMA_MAX_LOADED_MODELS=2   # VRAM guardrail — Ollama will swap as needed
#   export ANTHROPIC_API_KEY=sk-ant-...
#
# Cognitive-diversity check: gemma / deepseek / phi / claude — four distinct families.

version: 1
name: workstation-4agent

agents:
  - name: Muse
    role: ideator
    model: ollama/gemma3:4b
    temperature: 0.9
    max_tokens: 1536

  - name: Judge
    role: reasoner
    model: ollama/deepseek-r1:7b
    temperature: 0.4
    max_tokens: 2048

  - name: Hawk
    role: critic
    model: ollama/phi4-mini:3.8b
    temperature: 0.2
    max_tokens: 1536
    json_mode: true

  - name: Scribe
    role: orchestrator
    model: anthropic/claude-haiku-4-5-20251001
    temperature: 0.3
    max_tokens: 2048
