# Workstation council: 24GB VRAM (e.g. RTX 4090 class), 6 agents, all-local.
#
# Each model is chosen against a role-specific capability spec so that when a
# model releases with higher scores on a role's primary benchmarks, the next
# pick is obvious. Research-grounded picks as of April 2026.
#
# Models to pull (`ollama pull …` or `docker exec ollama ollama pull …`):
#   qwen3.6:latest          23 GB    Pioneer — 35B MoE / 3B active, 256K-1M context
#   deepseek-r1:32b         20 GB    Analyst — explicit RLVR-trained reasoning chains
#   devstral-small-2:24b    14 GB    Specialist — 68% SWE-bench Verified
#   gpt-oss:20b             13 GB    Skeptic — different family, tunable reasoning depth
#   mistral-small:latest    14 GB    Finisher — fast, tool-calling, polish
#   gemma4:31b              17 GB    Chairman — Elo 1452 above 600B+ open models
#
# Families: qwen / deepseek / devstral / gpt / mistral / gemma — six distinct.
# Total disk ~101 GB. Set OLLAMA_MAX_LOADED_MODELS=2 — Ollama swaps as needed.

version: 1
name: workstation

agents:
  - name: Muse
    role: ideator
    # Pioneer capability spec: high Elo-per-parameter on LMArena Creative Writing,
    # long context (≥128K), strong instruction-following. DO NOT optimize for
    # reasoning/math benchmarks here — that's the Analyst's role. When a model
    # beats qwen3.6 on human-preference creative-writing Elo at comparable VRAM,
    # swap it in. Higher temperature unlocks the divergent-framing capacity.
    model: ollama/qwen3.6:latest
    temperature: 0.9
    max_tokens: 2048
    # Big Five: high Openness + above-average Extraversion drive divergent framings.
    openness: 0.9
    extraversion: 0.7

  - name: Judge
    role: reasoner
    # Analyst capability spec: AIME 2026 ≥ 80%, GPQA Diamond ≥ 80%, explicit
    # <think> chain support (reasoning-tuned models are measurably less
    # conformist in multi-agent studies — GPT-o1-mini scored 3.13% conformity
    # vs GPT-4o at 19.45%). The visible reasoning chain is what the Skeptic can
    # attack step-by-step. olmo-3.1:32b is a viable alternative from a distinct
    # family (AI2) with MATH ~96.1%, HumanEvalPlus ~91.4%.
    model: ollama/deepseek-r1:32b
    temperature: 0.3
    max_tokens: 3072
    # Big Five: high Conscientiousness + elevated Neuroticism (epistemic anxiety
    # — uncomfortable with unsupported claims). Low Agreeableness when evaluating.
    conscientiousness: 0.9
    neuroticism: 0.7
    agreeableness: 0.3

  - name: Adept
    role: specialist
    # Specialist capability spec: SWE-bench Verified ≥ 60%, Terminal-Bench 2.0 ≥
    # 35%, τ²-Bench ≥ 80%, long context for repo-scale reasoning. Devstral
    # Small 2 is the only top-tier agentic-coding model that fits 24GB (68%
    # SWE-bench Verified, 256K context, Apache 2.0). Qwen3-Coder 30B-A3B is the
    # next pick if license matters; beware that Qwen family is already used.
    model: ollama/devstral-small-2:24b
    temperature: 0.4
    max_tokens: 4096
    # Big Five: high Conscientiousness, low Agreeableness — precision over politeness,
    # won't hedge inside the domain.
    conscientiousness: 0.9
    agreeableness: 0.3

  - name: Hawk
    role: critic
    # Skeptic capability spec: strong reasoning (AIME/GPQA above some floor),
    # high instruction-following (IFEval ≥ 85), AND a different model family
    # from all other council members. Family diversity dominates raw score
    # differences here — the Skeptic's value is finding flaws the others'
    # training distribution misses. gpt-oss:20b covers OpenAI distribution
    # and offers three reasoning-effort levels (low/medium/high) via the
    # system prompt, which is the adversarial-depth knob this role needs.
    model: ollama/gpt-oss:20b
    temperature: 0.2
    max_tokens: 2048
    json_mode: true
    # Big Five: Low Agreeableness drives the adversarial review; high Openness lets
    # the Skeptic steelman opposing positions; high Conscientiousness grounds
    # critiques in specific quoted text.
    openness: 0.7
    conscientiousness: 0.8
    agreeableness: 0.2

  - name: Polish
    role: finisher
    # Finisher capability spec: fast, reliable tool-use, native function
    # calling, strong verification loops. Raw reasoning matters less —
    # this role's mandate is rigor, not authorship. Mistral Small's
    # tool-calling reliability and low latency are the fit. Gemma 3 9B
    # is the non-Mistral alternative if you need family diversity.
    model: ollama/mistral-small:latest
    temperature: 0.1
    max_tokens: 3072
    tools: [current_time, calculate, read_file, fetch_url]
    # Big Five: very high Conscientiousness (rigor, not authorship); low Openness
    # (don't introduce new ideas during polish).
    conscientiousness: 0.95
    openness: 0.2

  - name: Scribe
    role: orchestrator
    # Chairman capability spec: IFEval ≥ 85, high LMArena Elo, ≥200K
    # context for full-transcript ingestion, native system-prompt support
    # for holding the behavioral contract. DO NOT optimize for AIME/GPQA
    # — synthesis is not reasoning. Gemma 4 31B's Elo 1452 sits above
    # Qwen 3.5-397B and GLM-5 (600-1000B range) while fitting 24GB,
    # making it the Pareto-optimal Chairman pick. Swap when a model
    # beats Gemma 4 on IFEval + LMArena Elo at the same VRAM band.
    model: ollama/gemma4:31b
    temperature: 0.3
    max_tokens: 3072
    # Big Five: balanced with elevated Conscientiousness for faithful synthesis;
    # moderate Agreeableness to preserve minority positions instead of
    # rubber-stamping majority.
    conscientiousness: 0.8
    agreeableness: 0.5
